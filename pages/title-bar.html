<!-- VEIL custom title bar — used by PRISM's load_title_bar() (file must be
     named title-bar.html and live next to base.html). -->
<header class="veil-titlebar">
    <div class="veil-titlebar__brand">
        <span class="veil-titlebar__mark"></span>
        <span class="veil-titlebar__wordmark">VEIL</span>
    </div>
    <div class="veil-titlebar__crumb">
        <b id="veil-crumb-section">Home</b>
    </div>
    <div class="veil-titlebar__spacer"></div>
    <div class="veil-titlebar__actions">
        <button class="veil-window-btn" data-window-action="minimize" data-tooltip="Minimize" aria-label="Minimize">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="2" y1="6" x2="10" y2="6"/></svg>
        </button>
        <button class="veil-window-btn" data-window-action="maximize" data-tooltip="Maximize" aria-label="Maximize">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="2.5" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="veil-window-btn veil-window-btn--close" data-window-action="close" data-tooltip="Close" aria-label="Close">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4"><line x1="3" y1="3" x2="9" y2="9"/><line x1="9" y1="3" x2="3" y2="9"/></svg>
        </button>
    </div>
</header>
