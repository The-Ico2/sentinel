<!-- OpenDesktop — Sidebar Component -->

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-brand">
      <div class="brand-logo">OD</div>
      <span class="brand-text">OpenDesktop</span>
    </div>
    <div class="collapse-btn" data-action="toggle-class" data-class="collapsed" data-target="sidebar">‹</div>
  </div>

  <div class="nav-section">
    <div class="nav-item" id="nav-home" data-navigate="home">
      <div class="nav-icon">H</div>
      <span class="nav-text">Home</span>
    </div>
    <div class="nav-item" id="nav-addons" data-navigate="addons">
      <div class="nav-icon">A</div>
      <span class="nav-text">Addons</span>
    </div>
    <div class="nav-divider"></div>
    <div class="nav-item" id="nav-data" data-navigate="data">
      <div class="nav-icon">D</div>
      <span class="nav-text">Live Data</span>
    </div>
    <div class="nav-item" id="nav-store" data-navigate="store">
      <div class="nav-icon">S</div>
      <span class="nav-text">Store</span>
    </div>
  </div>

  <div class="nav-spacer"></div>

  <div class="sidebar-bottom">
    <div class="bottom-buttons">
      <div class="bottom-btn" id="nav-settings" data-navigate="settings"><span>S</span></div>
      <div class="bottom-btn" data-action="ipc" data-ns="app" data-cmd="open-folder"><span>F</span></div>
    </div>
    <div class="clock-container">
      <span class="clock-segment" id="clock-h">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-segment" id="clock-m">00</span>
      <span class="clock-sep">:</span>
      <span class="clock-segment" id="clock-s">00</span>
    </div>
  </div>
</div>
