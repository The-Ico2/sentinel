<aside class="veil-sidebar prism-sidebar">

    <div class="veil-sidebar__head">
        <button class="veil-sidebar__toggle" data-sidebar-toggle data-tooltip="Toggle sidebar" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="18" x2="20" y2="18"/>
            </svg>
        </button>
        <span class="veil-sidebar__brand-text">VEIL</span>
    </div>

    <nav class="veil-nav-section">
        <button class="veil-nav-item" data-tooltip="Home" data-navigate="home">
            <span class="veil-nav-item__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 11l9-8 9 8"/>
                    <path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/>
                    <path d="M9 21V14h6v7"/>
                </svg>
            </span>
            <span class="veil-nav-item__label">Home</span>
        </button>

        <button class="veil-nav-item" data-tooltip="Data" data-navigate="data">
            <span class="veil-nav-item__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="8" ry="3"/>
                    <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/>
                    <path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/>
                </svg>
            </span>
            <span class="veil-nav-item__label">Data</span>
        </button>

        <!-- Addons: hierarchical group. Click expands to show installed addons. -->
        <button class="veil-nav-item" data-tooltip="Addons" data-navigate="addons" data-nav-group>
            <span class="veil-nav-item__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1.2"/>
                    <rect x="14" y="3" width="7" height="7" rx="1.2"/>
                    <rect x="3" y="14" width="7" height="7" rx="1.2"/>
                    <path d="M17.5 14v3.5M17.5 17.5H21M17.5 17.5V21M17.5 17.5H14"/>
                </svg>
            </span>
            <span class="veil-nav-item__label">Addons</span>
            <span class="veil-nav-item__caret">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 6 15 12 9 18"/>
                </svg>
            </span>
        </button>
        <!-- Addon children are populated dynamically by Veil core (ext.prism.json
             discovery). Each entry is appended as a .veil-nav-item with
             data-navigate="<addon_id>.<page_id>". -->
        <div class="veil-nav-children" data-veil-addon-list>
            <!-- empty by default -->
        </div>

        <button class="veil-nav-item" data-tooltip="Store" data-navigate="store">
            <span class="veil-nav-item__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 7l1.5-3h15L21 7"/>
                    <path d="M3 7v12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7"/>
                    <path d="M9 7v3a3 3 0 0 1-6 0V7M21 7v3a3 3 0 0 1-6 0V7M15 7v3a3 3 0 0 1-6 0V7"/>
                </svg>
            </span>
            <span class="veil-nav-item__label">Store</span>
        </button>
    </nav>

    <div class="veil-sidebar__spacer"></div>

    <nav class="veil-nav-section">
        <button class="veil-nav-item" data-tooltip="Settings" data-navigate="settings">
            <span class="veil-nav-item__icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/>
                </svg>
            </span>
            <span class="veil-nav-item__label">Settings</span>
        </button>
    </nav>
</aside>
